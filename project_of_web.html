<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaskPulse App</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
font-family: Arial;
text-align: center;
background: #f4f4f4;
transition: 0.5s;
}

h1 {
color: #333;
}

.container {
margin-top: 30px;
}

input {
padding: 10px;
width: 250px;
}

button {
padding: 10px;
cursor: pointer;
margin-left: 5px;
}

ul {
list-style: none;
padding: 0;
margin-top: 20px;
}

li {
background: white;
margin: 10px auto;
padding: 10px;
width: 300px;
display: flex;
justify-content: space-between;
border-radius: 6px;
}

.done {
text-decoration: line-through;
color: gray;
}

.counter {
margin-top: 10px;
font-weight: bold;
}
</style>
</head>

<body>

<h1>⚡ TaskPulse</h1>

<div class="container">

<input type="text" id="taskInput" placeholder="Enter task">
<button id="addBtn">Add</button>

<div class="counter">Total Tasks: <span id="count">0</span></div>

<ul id="list"></ul>

</div>

<script>
$(document).ready(function () {

let count = 0;

  // Add task
$("#addBtn").click(function () {

    let task = $("#taskInput").val();

    if (task === "") {
    alert("Please enter a task!");
return;
    }

    count++;
    $("#count").text(count);

    let item = `
<li>
        <span class="taskText">${task}</span>
        <div>
<button class="doneBtn">✔</button>
<button class="delBtn">❌</button>
        </div>
</li>
    `;

    $("#list").append(item);
    $("#taskInput").val("");
});

  // Mark done
$(document).on("click", ".doneBtn", function () {
$(this).parent().parent().find(".taskText").toggleClass("done");
});

  // Delete task
$(document).on("click", ".delBtn", function () {
    $(this).parent().parent().fadeOut(300, function () {
    $(this).remove();
    count--;
    $("#count").text(count);
    });
});

});
</script>

</body>
</html>
